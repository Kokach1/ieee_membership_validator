<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IEEE Membership Validator</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="header">
    <h1>IEEE Membership Validator</h1>
    <p>Automate membership validation from Excel</p>
    <p class="creator">Made with ❤️ by Kokachi</p>
  </div>

  <div class="container">
    <!-- Controls Section -->
    <div class="controls">
      <div class="file-upload" id="dropZone">
        <div class="drop-zone-content">
          <p class="drop-zone-text">📁 Drag Excel file here or click to browse</p>
          <label for="fileInput" class="upload-btn">
            Choose File
          </label>
          <input type="file" id="fileInput" accept=".xlsx,.xls" />
          <span class="file-name" id="fileName">No file selected</span>
        </div>
      </div>

      <div class="action-buttons">
        <button id="startBtn" class="btn btn-primary" disabled>
          ▶ Start Validation
        </button>
        <button id="cancelBtn" class="btn btn-cancel" disabled>
          ✕ Cancel
        </button>
        <button id="exportBtn" class="btn btn-secondary" disabled>
          💾 Export Results
        </button>
      </div>

      <div class="error-message" id="errorMessage"></div>
    </div>

    <!-- Summary Dashboard -->
    <div class="summary-dashboard" id="summaryDashboard">
      <h2>📊 Validation Summary</h2>
      <div class="stats-grid">
        <div class="stat-card valid">
          <div class="stat-number" id="validCount">0</div>
          <div class="stat-label">Valid</div>
        </div>
        <div class="stat-card invalid">
          <div class="stat-number" id="invalidCount">0</div>
          <div class="stat-label">Invalid</div>
        </div>
        <div class="stat-card error">
          <div class="stat-number" id="errorCount">0</div>
          <div class="stat-label">Errors</div>
        </div>
        <div class="stat-card total">
          <div class="stat-number" id="totalCount">0</div>
          <div class="stat-label">Total</div>
        </div>
      </div>
      <div class="success-rate">
        <div class="rate-label">Success Rate:</div>
        <div class="rate-value" id="successRate">0%</div>
      </div>
    </div>

    <!-- Status Section -->
    <div class="status" id="statusSection">
      <div class="status-text" id="statusText">
        <span class="spinner"></span>
        Processing...
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 0%">0%</div>
      </div>
    </div>

    <!-- Results Section -->
    <div class="results" id="resultsSection">
      <h2>Validation Results</h2>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Membership ID</th>
              <th>Validity</th>
            </tr>
          </thead>
          <tbody id="resultsBody">
            <!-- Results will be populated here -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="lib/xlsx.full.min.js"></script>
  <script src="popup.js"></script>
</body>

</html>
